<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出欠回答フォーム | Hashimoto Semi Blue Banquet 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="topnav">
  <div class="wrap">
    <a class="brand" href="index.html">Hashimoto lab Blue Banquet</a>
    <a class="back" href="index.html">← 招待状に戻る</a>
  </div>
</nav>

<div class="rsvp-hero wrap">
  <span class="kicker">RSVP</span>
  <h1 class="display">出欠回答フォーム</h1>
  <p>回答締切：〇月〇日（〇）まで</p>
</div>

<main class="wrap" style="padding-bottom:80px;">

  <form id="rsvpForm" novalidate>

    <div class="form-card">
      <h3>Step 1</h3>
      <div class="step-title">基本情報</div>

      <div class="field">
        <label class="q" for="name">お名前<span class="req">必須</span></label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="field">
        <label class="q" for="cohort">何期生ですか？<span class="req">必須</span></label>
        <input type="text" id="cohort" name="cohort" placeholder="例）15期" required>
      </div>

      <div class="field">
        <label class="q" for="industry">現在の業界・職種<span class="opt">任意</span></label>
        <input type="text" id="industry" name="industry" placeholder="例）IT / 営業職">
        <p class="hint">当日の「業界別マップ」作成の参考にさせていただきます。</p>
      </div>
    </div>

    <div class="form-card">
      <h3>Step 2</h3>
      <div class="step-title">当日の配慮事項</div>

      <div class="field">
        <label class="q" for="allergy">食事のアレルギー<span class="opt">任意</span></label>
        <input type="text" id="allergy" name="allergy">
      </div>

      <div class="field">
        <label class="q">おタバコは吸われますか？<span class="req">必須</span></label>
        <div class="radio-group">
          <label><input type="radio" name="smoking" value="はい" required>はい</label>
          <label><input type="radio" name="smoking" value="いいえ">いいえ</label>
        </div>
      </div>

      <div class="field">
        <label class="q">お子様と一緒に参加されますか？<span class="req">必須</span></label>
        <div class="radio-group" id="kidsGroup">
          <label><input type="radio" name="kids" value="いいえ" required>いいえ</label>
          <label><input type="radio" name="kids" value="はい">はい</label>
        </div>
        <div class="sub-field" id="kidsAgeWrap">
          <input type="number" id="kidsAge" min="0" max="18" placeholder="お子様の年齢">
        </div>
      </div>
    </div>

    <div class="form-card">
      <h3>Step 3</h3>
      <div class="step-title">企画連動アンケート<span class="opt">任意・ぜひご協力ください</span></div>

      <div class="field">
        <label class="q" for="msgToSensei">橋本先生やゼミ生への一言メッセージ</label>
        <textarea id="msgToSensei"></textarea>
      </div>

      <div class="field">
        <label class="q">あなたの「自画像」を1枚ください</label>
        <label class="file-drop" for="photo">
          📷 タップして写真を選択（仕事中の姿、学生時代、ペットとの写真など何でもOK）
          <input type="file" id="photo" accept="image/*">
        </label>
        <div class="file-name" id="photoName"></div>
        <p class="hint">当日のムービー等で使用します。4MBを超える画像は当日直接共有をお願いする場合があります。</p>
      </div>

      <div class="field">
        <label class="q" for="quiz">【クイズネタ募集】ゼミ在籍中、一番冷や汗をかいた（やらかした）思い出は？</label>
        <textarea id="quiz"></textarea>
      </div>
    </div>

    <div class="submit-row">
      <button type="submit" class="submit" id="submitBtn">出欠を送信する</button>
      <div class="submit-status" id="submitStatus"></div>
    </div>
  </form>

  <div class="thanks" id="thanksBox">
    <div class="display">ご回答ありがとうございました！</div>
    <p>当日、青いワンポイントを身につけて会場でお会いしましょう。</p>
    <a class="btn" href="index.html">招待状に戻る</a>
  </div>

</main>

<footer>
  <svg class="knot" width="40" height="24" viewBox="0 0 40 24" aria-hidden="true">
    <path d="M4 12 C 4 4, 16 4, 20 12 C 24 20, 36 20, 36 12" stroke="#B99C57" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  </svg>
  <p>Hashimoto Semi Blue Banquet 2026</p>
</footer>

<script src="rsvp.js"></script>
</body>
</html>
