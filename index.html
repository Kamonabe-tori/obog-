<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hashimoto lab Blue Banquet & Lounge 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&family=JetBrains+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-deep:  #0E1A30;
      --paper:      #FAF8F3;
      --blue:       #2C4A7C;
      --blue-deep:  #1B2E4F;
      --blue-pale:  #E7ECF5;
      --gold:       #B99C57;
      --ink:        #16233F;
      --ink-soft:   #5A6690;
      --line:       #D8D2C2;
      --radius:     6px;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--navy-deep);
      background-image: 
        radial-gradient(at 0% 0%, rgba(27, 46, 79, 0.4) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(14, 26, 48, 0.8) 0px, transparent 50%);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      color: var(--paper);
      overflow: hidden;
    }

    .gate-container {
      width: 100%;
      max-width: 420px;
      padding: 40px 28px;
      text-align: center;
      position: relative;
    }

    /* 上部の装飾ライン */
    .deco-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .deco-line .line {
      height: 1px;
      width: 40px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .deco-line .line.right {
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .deco-line span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--gold);
    }

    h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.06em;
      margin: 0 0 12px;
      color: #fff;
    }

    p.lead {
      font-size: 13px;
      color: #B9C3DE;
      margin: 0 0 32px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--gold);
      margin-bottom: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      background: rgba(250, 248, 243, 0.06);
      border: 1px solid rgba(185, 156, 87, 0.3);
      border-radius: var(--radius);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.25s ease;
      text-align: center;
      letter-spacing: 0.15em;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(250, 248, 243, 0.1);
      box-shadow: 0 0 12px rgba(185, 156, 87, 0.2);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      font-family: 'Shippori Mincho', serif;
      font-size: 15px;
      letter-spacing: 0.1em;
      background: var(--gold);
      color: var(--navy-deep);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .btn-submit:hover {
      background: #fff;
      transform: translateY(-1px);
    }

    .error-msg {
      height: 18px;
      margin-top: 14px;
      font-size: 12px;
      color: #ff6b6b;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .error-msg.show {
      opacity: 1;
    }

    footer {
      position: absolute;
      bottom: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(147, 166, 214, 0.5);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="gate-container">
    <div class="deco-line">
      <div class="line"></div>
      <span>MEMBERS ONLY</span>
      <div class="line right"></div>
    </div>

    <h1>Hashimoto lab</h1>
    <p class="lead">招待状を閲覧するには<br>パスワードを入力してください</p>

    <form id="gateForm">
      <div class="form-group">
        <label for="password">Enter Password</label>
        <input type="password" id="password" autocomplete="off" required >
      </div>
      <button type="submit" class="btn-submit">ENTER</button>
      <div id="errorMsg" class="error-msg">パスワードが正しくありません</div>
    </form>
  </div>

  <footer>© 2026 HASHIMOTO SEMINAR</footer>

  <script>
    document.getElementById('gateForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const inputPass = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      
      // パスワード判定（要件: hashilab）
      if (inputPass === 'hashilab') {
        errorMsg.classList.remove('show');
        
        // 成功したら「invite.html」にリダイレクト
        // 同一フォルダ内のinvite.htmlに遷移します
        window.location.href = 'invite.html';
      } else {
        // 間違っていたらエラーメッセージを表示して入力欄をクリア
        errorMsg.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
